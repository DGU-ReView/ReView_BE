spring:
  config:
    import: classpath:env.properties
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 1000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

stt:
  worker:
    base-url: http://localhost:8081   # 기본값/ 배포할때 EC2/Lambda 주소로 바꾸면 됨

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}         # S3 이름/ 실제 배포할때 .env나 AWS Secrets Manager로 주입
  region: ap-northeast-2    # S3 이름/ 실제 배포할때 .env나 AWS Secrets Manager로 주입
bedrock:
  region: ap-northeast-2
  model-id: anthropic.claude-3-5-sonnet-20240620-v1:0
  max-tokens: 512
  temperature: 0.4
  topP: 0.9