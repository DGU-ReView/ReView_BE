server:
  port: 8080
spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 1000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      repositories:
        enabled: false
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}       
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: ${REDIRECT_URI}
            scope: profile_nickname,account_email
            provider: kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
jwt:
  secret: ${JWT_SECRET}
stt:
  worker:
    base-url: http://localhost:8081   # 기본값/ 배포할때 EC2/Lambda 주소로 바꾸면 됨

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}         # S3 이름/ 실제 배포할때 .env나 AWS Secrets Manager로 주입

  region: ap-northeast-2    # S3 이름/ 실제 배포할때 .env나 AWS Secrets Manager로 주입
bedrock:
  region: ap-northeast-2
  model-id: anthropic.claude-3-5-sonnet-20240620-v1:0
  max-tokens: 512
  temperature: 0.4
  topP: 0.9
  limits:
    tpm: 120000
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
notification:
  random:
    probability: 10